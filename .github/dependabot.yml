version: 2

updates:
  # ─── GitHub Actions 版本自动更新 ───────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
    reviewers:
      - "porter"   # 替换为你的 GitHub username
    open-pull-requests-limit: 5

  # ─── Pub (Flutter/Dart) 依赖更新 ──────────────────────────
  # 注意：Pub 不支持自动 PR merge，但会在有安全漏洞时提示
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "flutter"
    commit-message:
      prefix: "chore(deps)"
    # 只更新有安全漏洞的直接依赖，避免噪音
    ignore:
      # 固定 Flutter SDK 版本，由 .fvmrc 管理
      - dependency-name: "flutter"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    open-pull-requests-limit: 10
    reviewers:
      - "porter"   # 替换为你的 GitHub username

