name: JoyMini Full Auto Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 授予写入部署记录的权限
permissions:
  contents: read
  deployments: write

jobs:
  # --- 任务 1: H5 编译与部署 ---
  build-h5:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy Web
        run: |
          # 1. 禁用分析，防止卡在交互问句上
          flutter config --no-analytics
          flutter config --enable-web
          
          # 2. 编译 H5
          echo "🚀 开始编译 H5..."
          flutter pub get
          flutter build web --release --dart-define-from-file=lib/core/config/env/prod.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: joymini-web
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # --- 任务 2: Android 打包 (必须等 H5 跑完) ---
  build-android:
    runs-on: self-hosted
    needs: build-h5 # 🚀 关键：让 Android 乖乖在后面排队，防止 lock 冲突
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 还原签名文件
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat << EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: 优化 Gradle 内存
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties

      - name: Build Android APK
        run: |
          echo "🚀 开始编译 Android APK..."
          flutter pub get
          flutter build apk --release --dart-define-from-file=lib/core/config/env/prod.json

      - name: 🚀 自动分发到 Firebase (Mac 原生版)
        run: |
          # 1. 确保安装了 Firebase 工具 (如果没有的话)
          # curl -sL https://firebase.tools | upgrade=true bash
          # 2. 直接调用本地命令上传
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --release-notes "大哥，这是由 MacBook Air 自动呈上的最新版本！"

      - name: 提取 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: 📱 发送通知到 Telegram
        if: success() # 只有成功了才发，失败了可以另外写一个告警
        run: |
          # 定义你要发送的消息内容
          MESSAGE="🚀 *JoyMini 自动化报告* 🚀%0A%0A✅ *Android*: 已空降 Firebase%0A🌍 *H5*: 已部署 Cloudflare%0A🔗 *下载链接*: ${{ secrets.FIREBASE_INVITE_LINK }}%0A%0A大哥，趁热安装！"
          
          # 暴力踢向 Telegram API
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=$MESSAGE"