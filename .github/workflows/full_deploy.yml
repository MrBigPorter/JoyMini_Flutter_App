name: JoyMini Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - test
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - test
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: QA Gate + Web Deploy  ── ubuntu-latest（便宜 10x）
  #   触发条件：所有事件（PR / push / tag）
  #   耗时预估：~20 min
  # ─────────────────────────────────────────────────────────────────
  web-and-qa:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      # 传递给 mobile-build job 使用
      env_file:    ${{ steps.set_env.outputs.env_file }}
      env_tag:     ${{ steps.set_env.outputs.env_tag }}
      is_prod:     ${{ steps.set_env.outputs.is_prod }}
      app_version: ${{ steps.meta.outputs.app_version }}
      short_sha:   ${{ steps.meta.outputs.short_sha }}
      firebase_app_id: ${{ steps.set_env.outputs.firebase_app_id }}

    steps:
      # ── Phase 1 ────────────────────────────────────────────────
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 🤖 1.5. Auto Bump Build Number
        if: github.event_name != 'pull_request'
        run: |
          VERSION_NAME=$(grep '^version: ' pubspec.yaml | sed 's/version: //g' | cut -d '+' -f 1)
          NEW_VERSION="$VERSION_NAME+${{ github.run_number }}"
          perl -pi -e "s/^version: .*/version: $NEW_VERSION/g" pubspec.yaml
          echo "✅ Cloud build version set to: $NEW_VERSION"

      # ── Phase 2 ────────────────────────────────────────────────
      - name: 2. Determine Deployment Environment
        id: set_env
        run: |
          # 同时写入 GITHUB_ENV（本 job 后续步骤用）和 GITHUB_OUTPUT（mobile-build job 用）
          set_var() { echo "$1=$2" >> $GITHUB_ENV; echo "$1=$2" >> $GITHUB_OUTPUT; }

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            set_var env_tag    "[PR PREVIEW]"
            set_var env_file   "lib/core/config/env/test.json"
            set_var is_prod    "false"
            set_var cf_branch  "pr-${{ github.event.pull_request.number }}"
            set_var cf_project "joymini-web-test"
            set_var firebase_app_id "${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/v* ]]; then
            set_var env_tag    "[PROD]"
            set_var env_file   "lib/core/config/env/prod.json"
            set_var is_prod    "true"
            set_var cf_branch  "main"
            set_var cf_project "joymini-web"
            set_var firebase_app_id "${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}"
          else
            set_var env_tag    "[TEST]"
            set_var env_file   "lib/core/config/env/test.json"
            set_var is_prod    "false"
            set_var cf_branch  "test"
            set_var cf_project "joymini-web-test"
            set_var firebase_app_id "${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}"
          fi

      # ── Phase 3 ────────────────────────────────────────────────
      - name: 📊 3. Extract Build Metadata
        id: meta
        run: |
          APP_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //g')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA"     >> $GITHUB_ENV
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA"     >> $GITHUB_OUTPUT

      # ── Phase 4: Flutter (ubuntu, no Java needed for web) ──────
      - name: 🐦 4a. Setup Flutter (ubuntu, cached)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true

      - name: 📦 4b. Flutter pub get
        run: |
          flutter config --no-analytics
          flutter pub get

      # ── Phase 4.5: QA Gate ─────────────────────────────────────
      - name: 🔎 4.5a. Flutter Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: 🧪 4.5b. Flutter Test
        run: |
          flutter test \
            --dart-define-from-file=${{ env.env_file }} \
            --reporter=github \
            --no-pub

      # ── Phase 5: Web ───────────────────────────────────────────
      - name: 🚀 5. Build Web (H5)
        run: |
          rm -rf build/web
          flutter build web --release --no-wasm-dry-run \
            --dart-define-from-file=${{ env.env_file }}

      - name: ☁️ Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ env.cf_project }}
          directory: build/web
          branch: ${{ env.cf_branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Mobile Build  ── macos-latest（只在非 PR 时运行）
  #   依赖 web-and-qa 成功，QA 不过则不浪费 macOS 机时
  #   触发条件：push / tag / workflow_dispatch
  #   耗时预估：~50 min
  # ─────────────────────────────────────────────────────────────────
  mobile-build:
    needs: web-and-qa
    if: github.event_name != 'pull_request'
    runs-on: self-hosted   # 本地 Mac runner，免费；iOS/Android 构建留在本机
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 从 web-and-qa 的 outputs 继承所有环境变量
      ENV_TAG:              ${{ needs.web-and-qa.outputs.env_tag }}
      ENV_FILE:             ${{ needs.web-and-qa.outputs.env_file }}
      IS_PROD:              ${{ needs.web-and-qa.outputs.is_prod }}
      APP_VERSION:          ${{ needs.web-and-qa.outputs.app_version }}
      SHORT_SHA:            ${{ needs.web-and-qa.outputs.short_sha }}

    steps:
      # ── Phase 1: Checkout ──────────────────────────────────────
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 🤖 1.5. Apply Version Bump (same formula as web-and-qa)
        run: |
          perl -pi -e "s/^version: .*/version: ${{ needs.web-and-qa.outputs.app_version }}/g" pubspec.yaml
          echo "✅ Version applied: ${{ needs.web-and-qa.outputs.app_version }}"

      # ── Phase 2: 在本 Job 直接设置 Firebase App ID ─────────────
      # ⚠️ Secret 不能通过 outputs 跨 Job 传递（会被 GitHub 安全机制清空）
      # 必须在本 Job 内直接从 secrets 读取
      - name: 🔑 2. Set Firebase Android App ID
        run: |
          if [[ "${{ env.IS_PROD }}" == "true" ]]; then
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}" >> $GITHUB_ENV
          else
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}" >> $GITHUB_ENV
          fi
          echo "✅ Firebase App ID 已设置 (IS_PROD=${{ env.IS_PROD }})"

      # ── Phase 4: Flutter Environment ───────────────────────────
      - name: 🐦 4a. Expose Local FVM to Runner
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: 🛠️ 4b. Prepare Flutter Environment via FVM
        run: |
          fvm install
          fvm flutter config --no-analytics
          fvm flutter pub get

      # ── Phase 6: iOS Bundle ID (Test Only) ─────────────────────
      - name: 🍏 6. Adjust iOS Bundle ID (Test Only)
        if: env.IS_PROD == 'false'
        run: |
          sed -i '' "s/com.porter.joyminis$/com.porter.joyminis.test/g" ios/Runner.xcodeproj/project.pbxproj
          echo "✅ iOS Bundle ID → com.porter.joyminis.test"

      # ── Phase 7: Credentials ───────────────────────────────────
      - name: 🔐 7. Restore All Credentials
        run: |
          rm -f android/key.properties android/app/*.jks android/app/*.keystore
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo "${{ secrets.LOCAL_PROPERTIES }}" > local.properties

          if [[ "${{ env.IS_PROD }}" == "true" ]]; then
            echo "🚀 [PROD] 写入生产证书..."
            echo '${{ secrets.IOS_G_SERVICES_PROD }}' > ios/Runner/GoogleService-Info.plist
            # Android Release 签名
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
            echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"     >> android/key.properties
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"           >> android/key.properties
            echo "storeFile=upload-keystore.jks"                        >> android/key.properties
          else
            echo "🧪 [TEST] 写入测试证书..."
            echo '${{ secrets.IOS_G_SERVICES_TEST }}' > ios/Runner/GoogleService-Info.plist
            # Android Debug 签名（内测分发用）
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > android/app/debug.keystore
            echo "storePassword=android"          > android/key.properties
            echo "keyPassword=android"           >> android/key.properties
            echo "keyAlias=androiddebugkey"      >> android/key.properties
            echo "storeFile=debug.keystore"      >> android/key.properties
          fi

      # ── Phase 7a: Shorebird ────────────────────────────────────
      - name: 🐦 7a. Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      # ── Phase 7b: Android Build ────────────────────────────────
      # [TEST]  → debug 签名 APK → Firebase 分发给内测人员
      # [PROD]  → release 签名 APK → Firebase 分发给管理员验收
      - name: 🤖 7b. Build Android APK via Shorebird
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          shorebird release android --artifact apk \
            -- --dart-define-from-file=${{ env.ENV_FILE }}
          echo "✅ Android APK 构建完成 (ENV: ${{ env.ENV_TAG }})"

      # ── Phase 8: iOS Build（仅编译，不签名）───────────────────
      # 当前：--no-codesign 只验证编译是否通过，不产出可安装包
      # 启用签名：在本机 Keychain 装好 Apple Distribution 证书后去掉 --no-codesign
      - name: 🍏 8. Build iOS IPA (no-codesign, compile verify only)
        run: |
          fvm flutter build ipa --release --no-codesign \
            --dart-define-from-file=${{ env.ENV_FILE }}
          echo "ℹ️ iOS 编译通过（未签名，暂不可安装）"

      # ──────────────────────────────────────────────────────────
      # [iOS TEST 分发] Firebase App Distribution
      # 条件：需要 Ad Hoc Provisioning Profile + 注册测试设备 UDID
      # 启用步骤：
      #   1. 去掉 --no-codesign，改为 Ad Hoc 签名
      #   2. 在 Firebase 注册测试设备 UDID
      #   3. 取消下方注释，填入 FIREBASE_IOS_APP_ID_TEST
      # ──────────────────────────────────────────────────────────
      # - name: 🍎 8b. [TEST] Distribute iOS via Firebase App Distribution
      #   if: env.IS_PROD == 'false'
      #   run: |
      #     IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -n 1)
      #     firebase appdistribution:distribute "$IPA_FILE" \
      #       --app "${{ secrets.FIREBASE_IOS_APP_ID_TEST }}" \
      #       --groups "admin" \
      #       --non-interactive \
      #       --release-notes "[TEST] ${{ env.APP_VERSION }}"

      # ──────────────────────────────────────────────────────────
      # [iOS PROD 发布] TestFlight → App Store
      # 条件：需要 Apple Distribution 证书 + App Store Connect API 密钥
      # 启用步骤：
      #   1. Mac Keychain 装好 Apple Distribution 证书
      #   2. App Store Connect → 用户与访问 → 密钥 → 创建 API Key
      #   3. 配置以下 3 个 GitHub Secrets：
      #      - APP_STORE_CONNECT_API_KEY_ID      (Key ID，10位字母数字)
      #      - APP_STORE_CONNECT_API_ISSUER_ID   (Issuer ID，UUID格式)
      #      - APP_STORE_CONNECT_API_KEY_BASE64  (下载的 .p8 文件 base64)
      #   4. 取消下方注释
      # ──────────────────────────────────────────────────────────
      # - name: 🍎 8c. [PROD] Upload iOS to TestFlight
      #   if: env.IS_PROD == 'true'
      #   run: |
      #     mkdir -p ~/.appstoreconnect/private_keys
      #     echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" \
      #       | base64 --decode \
      #       > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
      #     IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -n 1)
      #     xcrun altool --upload-app \
      #       --type ios --file "$IPA_FILE" \
      #       --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
      #       --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
      #     rm -rf ~/.appstoreconnect/private_keys
      #     echo "✅ iOS 已上传至 TestFlight"

      # ── Phase 9: Android → Firebase App Distribution ──────────
      # [TEST] → FIREBASE_ANDROID_APP_ID_TEST (com.porter.joyminis.test)
      # [PROD] → FIREBASE_ANDROID_APP_ID_PROD (com.porter.joyminis)
      - name: 🦅 9. Distribute Android to Firebase App Distribution
        run: |
          if ! command -v firebase &> /dev/null; then
            curl -sL https://firebase.tools | upgrade=true bash
          fi

          FB_KEY_PATH="${{ github.workspace }}/firebase-key.json"
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$FB_KEY_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$FB_KEY_PATH"

          TARGET_FILE=$(find build -name "*release.apk" | head -n 1)
          if [ -z "$TARGET_FILE" ] || [ ! -f "$TARGET_FILE" ]; then
            echo "❌ 找不到 APK，请检查 Phase 7b"
            exit 1
          fi

          echo "🚀 APK: $TARGET_FILE"
          echo "📱 App ID: ${{ env.FIREBASE_ANDROID_APP_ID }}"

          firebase appdistribution:distribute "$TARGET_FILE" \
            --app "${{ env.FIREBASE_ANDROID_APP_ID }}" \
            --groups "admin" \
            --non-interactive \
            --release-notes "[${{ env.ENV_TAG }}] v${{ env.APP_VERSION }} | ${{ env.SHORT_SHA }}"

          rm -f "$FB_KEY_PATH"
          echo "✅ Android 已分发至 Firebase (${{ env.ENV_TAG }})"

      # ── Phase 11: Telegram 通知 ────────────────────────────────
      - name: 📱 11. Send Telegram Report
        if: always()
        run: |
          STATUS_EMOJI=$([[ "${{ job.status }}" == "success" ]] && echo "✅" || echo "❌")
          MESSAGE="${STATUS_EMOJI} *JoyMini CI/CD*
          📌 *环境*: ${{ env.ENV_TAG }}
          📦 *版本*: \`${{ env.APP_VERSION }}\`
          📝 *Commit*: \`${{ env.SHORT_SHA }}\`
          🤖 *Android*: Firebase App Distribution ✅
          🍏 *iOS*: 编译通过，分发待启用
          🔥 *热更新*: Shorebird 已集成"

          QR_URL="https://quickchart.io/qr?text=${{ secrets.FIREBASE_INVITE_LINK }}&size=400"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "photo=$QR_URL" \
            -F "caption=$MESSAGE" \
            -F "parse_mode=Markdown"

      # ── Phase 12: Cleanup ──────────────────────────────────────
      - name: 🧹 12. Smart Cleanup
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks android/app/debug.keystore
          rm -f android/key.properties
          rm -f "${{ github.workspace }}/firebase-key.json"
          git checkout -- ios/Runner.xcodeproj/project.pbxproj
          git checkout -- pubspec.yaml
          echo "✅ Cleanup done"
