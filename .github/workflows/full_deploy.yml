name: JoyMini Enterprise CI/CD Pipeline

on:
  push:
    # 逻辑 1：推送到 test 分支时，自动触发测试环境打包
    branches:
      - test
    # 逻辑 2：只有推送 v 开头的标签时，才触发正式环境打包
    tags:
      - 'v*'
  # 逻辑 3：保留手动点击按钮触发，以防万一
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: self-hosted
    # [优化] 加入全局环境变量，强行使用 Node.js 24 新引擎
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # ================= Phase 1: Secure Checkout =================
      - name: 1. Checkout Code (Preserve Cache)
        uses: actions/checkout@v4
        with:
          clean: false

      # ================= Phase 1.5: Auto Versioning =================
      - name: 🤖 1.5. Auto Bump Build Number
        run: |
          VERSION_NAME=$(grep '^version: ' pubspec.yaml | sed 's/version: //g' | cut -d '+' -f 1)
          NEW_VERSION="$VERSION_NAME+${{ github.run_number }}"
          perl -pi -e "s/^version: .*/version: $NEW_VERSION/g" pubspec.yaml
          echo "✅ Cloud build version set to: $NEW_VERSION"

      # ================= Phase 2: Environment Determination =================
      - name: 2. Determine Deployment Environment
        id: set_env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "ENV_TAG=[PROD]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/prod.json" >> $GITHUB_ENV
            echo "CF_PROJECT=joymini-web" >> $GITHUB_ENV
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "IS_PROD=true" >> $GITHUB_ENV
          else
            echo "ENV_TAG=[TEST]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/test.json" >> $GITHUB_ENV
            echo "CF_PROJECT=joymini-web-test" >> $GITHUB_ENV
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}" >> $GITHUB_ENV
            echo "FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID_TEST }}" >> $GITHUB_ENV
            echo "IS_PROD=false" >> $GITHUB_ENV
          fi

      # ================= Phase 3: Extract Metadata =================
      - name: 📊 3. Extract Build Metadata
        id: meta
        run: |
          # [核心修复] 保留带 + 号的完整版本号
          APP_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //g')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV

      # ================= Phase 4: Environment Setup =================
      - name: 🐦 4a. Expose Local FVM to Runner
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: 🛠️ 4b. Prepare Flutter Environment via FVM
        run: |
          fvm install
          fvm flutter config --no-analytics
          fvm flutter pub get

      # ================= Phase 5: Web Deployment =================
      - name: 🚀 Build Web (H5)
        run: fvm flutter build web --release --dart-define-from-file=${{ env.ENV_FILE }}

      - name: ☁️ Deploy to Cloudflare Pages
        id: cf_deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ env.CF_PROJECT }}
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ================= Phase 6: iOS Dynamic Config =================
      - name: 🍏 Dynamically Adjust iOS Project Files (Test Only)
        if: env.IS_PROD == 'false'
        run: |
          sed -i '' "s/com.porter.joyminis/com.porter.joyminis.test/g" ios/Runner.xcodeproj/project.pbxproj
          echo "✅ iOS Bundle ID changed to .test"

      # ================= Phase 7: Android Build with Shorebird =================
      - name: 🔐 Restore Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat << EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: 🐦 7a. Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: 🚀 7b. Build Android via Shorebird (APK & AAB)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          # 自动触发 Release 并生成双包
          shorebird release android -- --dart-define-from-file=${{ env.ENV_FILE }}

      # ================= Phase 8: iOS Build =================
      - name: 🚀 Build iOS (IPA)
        run: |
          fvm flutter build ipa --release --no-codesign --dart-define-from-file=${{ env.ENV_FILE }}

      # ================= Phase 9: Firebase Distribution =================
      - name: 🦅 Distribute to Firebase App Distribution
        env:
          CREDENTIAL_FILE: ${{ github.workspace }}/firebase-key.json
        run: |
          if ! command -v firebase &> /dev/null; then
              curl -sL https://firebase.tools | upgrade=true bash
          fi
          
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > $CREDENTIAL_FILE
          export GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIAL_FILE
          
          # [终极修复] 动态寻找 APK 路径，彻底解决找不到文件的问题
          APK_PATH=$(find build -name "*release.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          
          if [ -f "$APK_PATH" ]; then
            firebase appdistribution:distribute "$APK_PATH" \
              --app "${{ env.FIREBASE_ANDROID_APP_ID }}" \
              --groups "admin" \
              --non-interactive \
              --release-notes "Version: ${{ env.APP_VERSION }} (Shorebird Enabled)"
          else
            echo "❌ Fatal: Could not find APK file!"
            exit 1
          fi

      # ================= Phase 10: Artifact Archiving =================
      - name: 💾 Archive Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.APP_VERSION }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: 💾 Archive iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ env.APP_VERSION }}
          path: build/ios/archive/
          if-no-files-found: ignore

      # ================= Phase 11: Telegram Notification =================
      - name: 📱 Send Detailed Telegram Report
        if: always()
        run: |
          MESSAGE="🐺 *JoyMini CI/CD Pipeline*
          📌 *Status*: ${{ job.status }}
          🏷️ *Environment*: ${{ env.ENV_TAG }}
          📦 *App Version*: \`${{ env.APP_VERSION }}\`
          📝 *Commit*: \`${{ env.SHORT_SHA }}\`
          🌐 *H5 Web*: [Preview Web App](${{ steps.cf_deploy.outputs.url }})
          🔥 *Hot Update*: Shorebird Engine Active 🐦"
          
          QR_URL="https://quickchart.io/qr?text=${{ secrets.FIREBASE_INVITE_LINK }}&size=400"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "photo=$QR_URL" \
            -F "caption=$MESSAGE" \
            -F "parse_mode=Markdown"

      # ================= Phase 12: Smart Cleanup =================
      - name: 🧹 12. Smart Cleanup
        if: always()
        run: |
          echo "Cleaning credentials only..."
          # [核心修复] 停止删除 build 目录，防止 Firebase 捡不到包且加速下次编译
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          rm -f ${{ github.workspace }}/firebase-key.json
          git checkout -- ios/Runner.xcodeproj/project.pbxproj
          git checkout -- pubspec.yaml
          echo "✅ Cleanup complete."