name: JoyMini Full Auto Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  #  深度优化：把 H5 和 Android 合并到一个任务里，只拉一次代码，极致提速！
  build-all:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 全局环境准备
        run: |
          flutter config --no-analytics
          flutter config --enable-web
          echo "🚀 获取所有依赖包..."
          flutter pub get

      # ================= 阶段 1: H5 阵地 =================
      - name: 🚀 编译 H5
        run: |
          echo "🚀 开始编译 H5 Web 端..."
          flutter build web --release --dart-define-from-file=lib/core/config/env/prod.json

      - name: ☁️ 部署 H5 到 Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: joymini-web
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ================= 阶段 2: Android 阵地 =================
      - name: 🔐 还原签名文件
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat << EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: ⚙️ 优化 Gradle 内存 (保留守护进程提速)
        run: |
          # 删掉了 daemon=false，利用 Mac 内存缓存加速后续编译
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      - name: 🚀 编译 Android APK
        run: |
          echo "🚀 开始编译 Android APK..."
          flutter build apk --release --dart-define-from-file=lib/core/config/env/prod.json

      - name: 🦅 自动分发到 Firebase
        run: |
          # 优化：加个判断，如果你的 Mac 已经装了 firebase，就不再重复下载了，提速！
          if ! command -v firebase &> /dev/null; then
              curl -sL https://firebase.tools | upgrade=true bash
          fi
          
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --groups "admin" \
            --non-interactive \
            --release-notes "大哥，这是 MacBook Air 全自动流水线极速产出的版本！" || true

      # ================= 阶段 3: 终极战报 =================
      - name: 📱 发送通知到 Telegram
        if: always() # 关键：这一步必须跟在最外层的步骤里，保证必发
        run: |
          # 修复了多余的 text 参数
          MESSAGE="🐺 *JoyMini 独狼战报* 🚀%0A%0A✅ *Android*: 成功空降 Firebase！%0A✅ *H5*: 成功部署 Cloudflare！%0A%0A大哥，快去手机端查收！"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=$MESSAGE"