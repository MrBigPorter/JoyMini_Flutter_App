name: JoyMini Professional CI/CD Pipeline

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: self-hosted  # 你的 MacBook Air Runner
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # ================= 阶段 A: 智能环境识别 =================
      - name: 2. 确定部署环境
        id: set_env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_TAG=[PROD 生产版]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/prod.json" >> $GITHUB_ENV
            echo "CF_PROJECT=joymini-web" >> $GITHUB_ENV
            # 正式版 ID
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "IS_PROD=true" >> $GITHUB_ENV
            echo "APP_ID_SUFFIX=" >> $GITHUB_ENV
          else
            echo "ENV_TAG=[TEST 测试版]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/test.json" >> $GITHUB_ENV
            echo "CF_PROJECT=joymini-web-test" >> $GITHUB_ENV
            # 测试版 ID (对应 com.porter.joyminis.test)
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}" >> $GITHUB_ENV
            echo "FIREBASE_IOS_APP_ID=${{ secrets.FIREBASE_IOS_APP_ID_TEST }}" >> $GITHUB_ENV
            echo "IS_PROD=false" >> $GITHUB_ENV
            echo "APP_ID_SUFFIX=.test" >> $GITHUB_ENV
          fi

      - name: 3. 全局 Flutter 环境准备
        run: |
          flutter config --no-analytics
          flutter pub get

      # ================= 阶段 B: Web 阵地 =================
      - name: 🚀 编译 H5 Web 端
        run: |
          flutter build web --release --dart-define-from-file=${{ env.ENV_FILE }}

      - name: ☁️ 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ env.CF_PROJECT }}
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ================= 阶段 C: iOS 动态变身 =================
      - name: 🍏 修改 iOS 项目配置 (仅限测试分支)
        if: env.IS_PROD == 'false'
        run: |
          # 动态修改 Bundle Identifier 为 .test 后缀
          sed -i '' "s/com.porter.joyminis/com.porter.joyminis.test/g" ios/Runner.xcodeproj/project.pbxproj
          echo "✅ iOS Bundle ID 已变更为 com.porter.joyminis.test"

      # ================= 阶段 D: Android 阵地 =================
      - name: 🔐 还原 Android 签名文件
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat << EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF

      - name: 🚀 编译 Android (APK + AAB)
        run: |
          # 无论什么分支都打 APK 方便分发
          flutter build apk --release --dart-define-from-file=${{ env.ENV_FILE }}
          
          # 生产环境额外打上架包 AAB
          if [ "${{ env.IS_PROD }}" = "true" ]; then
            flutter build appbundle --release --dart-define-from-file=${{ env.ENV_FILE }}
          fi

      # ================= 阶段 E: iOS 编译 =================
      - name: 🚀 编译 iOS (IPA)
        run: |
          # 使用 --no-codesign 绕过 Runner 的本地签名校验，由 Flutter 构建系统处理
          flutter build ipa --release --no-codesign --dart-define-from-file=${{ env.ENV_FILE }}

      # ================= 阶段 F: 统一分发到 Firebase =================
      - name: 🦅 分发到 Firebase App Distribution
        run: |
          if ! command -v firebase &> /dev/null; then
              curl -sL https://firebase.tools | upgrade=true bash
          fi
          
          # 1. 发送 Android APK
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ env.FIREBASE_ANDROID_APP_ID }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --groups "admin" \
            --non-interactive \
            --release-notes "${{ env.ENV_TAG }} Android 极速部署完成。"

          # 2. 发送 iOS IPA (如果需要的话，注意 iOS 必须有正确的 Ad-hoc 签名才能安装)
          # firebase appdistribution:distribute build/ios/ipa/Runner.ipa \
          #   --app "${{ env.FIREBASE_IOS_APP_ID }}" \
          #   --token "${{ secrets.FIREBASE_TOKEN }}" \
          #   --groups "admin" \
          #   --non-interactive

      # ================= 阶段 G: 存档与战报 =================
      - name: 💾 归档 AAB (仅限 main)
        if: env.IS_PROD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: production-aab-bundle
          path: build/app/outputs/bundle/release/app-release.aab

      - name: 📱 发送 Telegram 战报
        if: always()
        run: |
          MESSAGE="🐺 *JoyMini 自动流水线*%0A%0A📌 状态: ${{ job.status }}%0A🏷️ 环境: ${{ env.ENV_TAG }}%0A🌿 分支: \`${{ github.ref_name }}\`%0A%0A👇 *扫码安装最新版本*："
          QR_URL="https://quickchart.io/qr?text=${{ secrets.FIREBASE_INVITE_LINK }}&size=400"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "photo=$QR_URL" \
            -d "caption=$MESSAGE" \
            -d "parse_mode=Markdown"