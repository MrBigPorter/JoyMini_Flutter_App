name: JoyMini Enterprise CI/CD Pipeline

on:
  push:
    # 逻辑 1：推送到 test 分支时，自动触发测试环境打包
    branches:
      - test
    # 逻辑 2：只有推送 v 开头的标签时，才触发正式环境打包
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - test
    types:
      - opened
      - synchronize
      - reopened
  # 逻辑 3：保留手动点击按钮触发，以防万一
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  preflight-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Publish self-hosted runner reminder
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## 🖥️ Self-hosted Runner Reminder

          This workflow continues on your local Mac self-hosted runner.

          If the next job stays in **Queued**, please start the runner first:

          ```bash
          cd /Volumes/MySSD/github-runner
          ./run.sh
          ```

          Wait until the terminal shows **Connected to GitHub**.

          Current trigger details:
          - Event: `${{ github.event_name }}`
          - Ref: `${{ github.ref }}`
          - Actor: `${{ github.actor }}`

          For PR/web preview runs, the workflow still needs the local self-hosted runner to pick up the build job.
          EOF

          echo "Reminder published: start the local self-hosted runner and wait for 'Connected to GitHub' if the next job is queued."

  build-and-deploy:
    needs: preflight-reminder
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    # [优化] 加入全局环境变量，强行使用 Node.js 24 新引擎
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # ================= Phase 1: Secure Checkout =================
      - name: 1. Checkout Code (Preserve Cache)
        uses: actions/checkout@v4
        with:
          clean: false

      # ================= Phase 1.5: Auto Versioning =================
      - name: 🤖 1.5. Auto Bump Build Number
        if: github.event_name != 'pull_request'
        run: |
          VERSION_NAME=$(grep '^version: ' pubspec.yaml | sed 's/version: //g' | cut -d '+' -f 1)
          NEW_VERSION="$VERSION_NAME+${{ github.run_number }}"
          perl -pi -e "s/^version: .*/version: $NEW_VERSION/g" pubspec.yaml
          echo "✅ Cloud build version set to: $NEW_VERSION"

      # ================= Phase 2: Environment Determination =================
      - name: 2. Determine Deployment Environment
        id: set_env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ENV_TAG=[PR PREVIEW]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/test.json" >> $GITHUB_ENV
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}" >> $GITHUB_ENV
            echo "IS_PROD=false" >> $GITHUB_ENV
            echo "IS_PR=true" >> $GITHUB_ENV
            echo "CF_BRANCH=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "ENV_TAG=[PROD]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/prod.json" >> $GITHUB_ENV
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}" >> $GITHUB_ENV
            echo "IS_PROD=true" >> $GITHUB_ENV
            echo "IS_PR=false" >> $GITHUB_ENV
            echo "CF_BRANCH=main" >> $GITHUB_ENV
          else
            echo "ENV_TAG=[TEST]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/test.json" >> $GITHUB_ENV
            echo "FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID_TEST }}" >> $GITHUB_ENV
            echo "IS_PROD=false" >> $GITHUB_ENV
            echo "IS_PR=false" >> $GITHUB_ENV
            echo "CF_BRANCH=test" >> $GITHUB_ENV
          fi

      # ================= Phase 3: Extract Metadata =================
      - name: 📊 3. Extract Build Metadata
        id: meta
        run: |
          # [核心修复] 保留带 + 号的完整版本号
          APP_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //g')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ================= Phase 4: Environment Setup =================
      - name: 🐦 4a. Expose Local FVM to Runner
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: 🛠️ 4b. Prepare Flutter Environment via FVM
        run: |
          fvm install
          fvm flutter config --no-analytics
          fvm flutter pub get

      # ================= Phase 5: Web Deployment =================
      - name: 🚀 Build Web (H5)
        run: fvm flutter build web --release --dart-define-from-file=${{ env.ENV_FILE }}

      - name: ☁️ Deploy to Cloudflare Pages
        id: cf_deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ env.CF_PROJECT || 'joymini-web' }}
          directory: build/web
          branch: ${{ env.CF_BRANCH }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # ================= Phase 6: iOS Dynamic Config =================
      - name: 🍏 Dynamically Adjust iOS Project Files (Test Only)
        if: github.event_name != 'pull_request' && env.IS_PROD == 'false'
        run: |
          sed -i '' "s/com.porter.joyminis/com.porter.joyminis.test/g" ios/Runner.xcodeproj/project.pbxproj
          echo "✅ iOS Bundle ID changed to .test"

      # ================= Phase 7: Restore All Credentials =================
      - name: 🔐 7. Restore All Credentials (Environment Aware)
        if: github.event_name != 'pull_request'
        run: |
          # 1. 强制清理旧的残留配置，防止干扰
          rm -f android/key.properties
          rm -f android/app/*.jks
          rm -f android/app/*.keystore

          # 2. 还原公共配置文件
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo "${{ secrets.LOCAL_PROPERTIES }}" > local.properties

          # 3. 分环境还原“玉玺”
          if [[ "${{ env.IS_PROD }}" == "true" ]]; then
            echo "🚀 正在部署 [正式版]..."
            echo '${{ secrets.IOS_G_SERVICES_PROD }}' > ios/Runner/GoogleService-Info.plist
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
            # 逐行写入，避开 EOF 缩进坑
            echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=upload-keystore.jks" >> android/key.properties
          else
            echo "🧪 正在部署 [测试版]..."
            echo '${{ secrets.IOS_G_SERVICES_TEST }}' > ios/Runner/GoogleService-Info.plist
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > android/app/debug.keystore
            # 逐行写入测试版专用配置
            echo "storePassword=android" > android/key.properties
            echo "keyPassword=android" >> android/key.properties
            echo "keyAlias=androiddebugkey" >> android/key.properties
            echo "storeFile=debug.keystore" >> android/key.properties
          fi

      - name: 🐦 7a. Setup Shorebird
        if: github.event_name != 'pull_request'
        uses: shorebirdtech/setup-shorebird@v1

      # 【本次核心修改 1】：强制产出 APK
      - name: 🚀 7b. Build Android via Shorebird (Force APK)
        if: github.event_name != 'pull_request'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          shorebird release android --artifact apk -- --dart-define-from-file=${{ env.ENV_FILE }}

      # ================= Phase 8: iOS Build =================
      - name: 🚀 Build iOS (IPA)
        if: github.event_name != 'pull_request'
        run: |
          fvm flutter build ipa --release --no-codesign --dart-define-from-file=${{ env.ENV_FILE }}

      # ================= Phase 9: Firebase Distribution =================
      # 【本次核心修改 2】：只认 APK，失败即报错！
      - name: 🦅 9. Distribute to Firebase App Distribution
        if: github.event_name != 'pull_request'
        run: |
          if ! command -v firebase &> /dev/null; then
              curl -sL https://firebase.tools | upgrade=true bash
          fi
          
          FB_KEY_PATH="${{ github.workspace }}/firebase-key.json"
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$FB_KEY_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$FB_KEY_PATH"
          
          TARGET_FILE=$(find build -name "*release.apk" | head -n 1)
          
          if [ -n "$TARGET_FILE" ] && [ -f "$TARGET_FILE" ]; then
            echo "🚀 Found APK to upload: $TARGET_FILE"
            # 删除了 || echo，失败直接抛出红灯！
            firebase appdistribution:distribute "$TARGET_FILE" \
              --app "${{ env.FIREBASE_ANDROID_APP_ID }}" \
              --groups "admin" \
              --non-interactive \
              --release-notes "Version: ${{ env.APP_VERSION }} (Shorebird Release)"
          else
            echo "❌ 致命错误: 没有找到 APK 文件！请检查 7b 步骤。"
            exit 1
          fi
          
          rm -f "$FB_KEY_PATH"

      # ================= Phase 10: Skip Artifact Upload =================
      # 为节省 GitHub Actions 存储空间，不再上传 APK/IPA 到 Artifacts。
      # 安装分发仍通过 Firebase App Distribution，Web 仍部署到 Cloudflare。

      # ================= Phase 11: Telegram Notification =================
      - name: 📱 Send Detailed Telegram Report
        if: always() && github.event_name != 'pull_request'
        run: |
          MESSAGE="🐺 *JoyMini CI/CD Pipeline*
          📌 *Status*: ${{ job.status }}
          🏷️ *Environment*: ${{ env.ENV_TAG }}
          📦 *App Version*: \`${{ env.APP_VERSION }}\`
          📝 *Commit*: \`${{ env.SHORT_SHA }}\`
          🔥 *Hot Update*: Shorebird Engine Active 🐦"
          
          QR_URL="https://quickchart.io/qr?text=${{ secrets.FIREBASE_INVITE_LINK }}&size=400"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F "photo=$QR_URL" \
            -F "caption=$MESSAGE" \
            -F "parse_mode=Markdown"

      # ================= Phase 12: Smart Cleanup =================
      - name: 🧹 12. Smart Cleanup
        if: always()
        run: |
          echo "Cleaning credentials..."
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          rm -f "${{ github.workspace }}/firebase-key.json"
          git checkout -- ios/Runner.xcodeproj/project.pbxproj
          git checkout -- pubspec.yaml
          echo "✅ Cleanup complete."