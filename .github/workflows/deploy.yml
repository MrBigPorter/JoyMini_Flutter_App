name: JoyMini H5 Auto Deploy

on:
  push:
    branches:
      - main  # 确认你本地分支名是 main，如果是 master 请改为 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 准备 Flutter 环境（注意：不是单纯的 Dart 环境）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. 编译 Web 静态产物
      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release --web-renderer canvaskit

      # 4. 一键投递到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: joymini-web # 必须匹配项目名
          directory: build/web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}