name: "🚑 JoyMini Hot Update (Patch)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '🎯 Select Target Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod

jobs:
  shorebird-patch:
    runs-on: self-hosted   # 本地 Mac runner，免费
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ================= Step 1: Initialization =================
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # ================= Step 2: Configuration =================
      - name: 2. Set Environment Variables
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
            echo "ENV_TAG=[PROD]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/prod.json" >> $GITHUB_ENV
            echo "IS_PROD=true" >> $GITHUB_ENV
          else
            echo "ENV_TAG=[TEST]" >> $GITHUB_ENV
            echo "ENV_FILE=lib/core/config/env/test.json" >> $GITHUB_ENV
            echo "IS_PROD=false" >> $GITHUB_ENV
          fi

      # ================= Step 2.5: Restore Credentials =================
      - name: 🔐 2.5. Restore Build Credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo "${{ secrets.LOCAL_PROPERTIES }}" > local.properties

          if [[ "${{ env.IS_PROD }}" == "true" ]]; then
            echo '${{ secrets.IOS_G_SERVICES_PROD }}' > ios/Runner/GoogleService-Info.plist
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
            echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"      >> android/key.properties
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"            >> android/key.properties
            echo "storeFile=upload-keystore.jks"                         >> android/key.properties
          else
            echo '${{ secrets.IOS_G_SERVICES_TEST }}' > ios/Runner/GoogleService-Info.plist
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > android/app/debug.keystore
            echo "storePassword=android"           > android/key.properties
            echo "keyPassword=android"            >> android/key.properties
            echo "keyAlias=androiddebugkey"       >> android/key.properties
            echo "storeFile=debug.keystore"       >> android/key.properties
          fi

      # ================= Step 3: Flutter Setup =================
      - name: 🐦 3a. Expose Local FVM to Runner
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: 🛠️ 3b. Prepare Flutter Environment via FVM
        run: |
          fvm install
          fvm flutter config --no-analytics
          fvm flutter pub get

      # ================= Step 4: Shorebird =================
      - name: 🐦 4. Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      # ================= Step 5: Core Deployment =================
      - name: 🚀 5. Build and Publish Patch
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          shorebird patch android --force -- --dart-define-from-file=${{ env.ENV_FILE }}

      # ================= Step 6: Reporting =================
      - name: 📱 6. Send Telegram Notification
        if: always()
        run: |
          MESSAGE="🚑 *JoyMini Hotfix Patch Deployed* 🚀

          📌 *Status*: ${{ job.status }}
          🏷️ *Target Env*: ${{ env.ENV_TAG }}
          🌿 *Branch*: \`${{ github.ref_name }}\`
          👨‍💻 *Triggered By*: ${{ github.actor }}

          ✅ *Patch successfully pushed to Shorebird Cloud!*
          The update will be silently downloaded by active apps. Users only need to restart the application to apply changes."

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"

      # ================= Step 7: Smart Cleanup =================
      - name: 🧹 7. Smart Workspace Cleanup
        if: always()
        run: |
          rm -f android/app/google-services.json
          rm -f android/app/upload-keystore.jks
          rm -f android/app/debug.keystore
          rm -f android/key.properties
          rm -f local.properties
          rm -rf build/app/outputs/
          git checkout -- .
          echo "✅ Cleanup complete."
