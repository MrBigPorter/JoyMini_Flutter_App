        body {

        .joymini-loader-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;

            width: 100px;
            height: 100px;

            background-position: center;
            animation: breath 2s ease-in-out infinite;
        }
        .loading-text {
            margin-top: 24px;
            color: #FF5722;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes breath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

<script src="flutter_bootstrap.js" async=""></script>

<script>
    const observer = new MutationObserver(function(mutations) {
        for (let mutation of mutations) {
            if (mutation.addedNodes.length > 0) {
                for (let node of mutation.addedNodes) {
                    //  关键修复：加入对最新 <flutter-view> 标签的捕获！
                    if (node.tagName === 'FLUTTER-VIEW' ||
                        node.tagName === 'FLT-GLASS-PANE' ||
                        node.tagName === 'FLT-SCENE-HOST') {

                        let loader = document.getElementById('joymini-loader');
                        if (loader) {
                            // 给 0.5 秒的渐隐过度，掩盖 Flutter 引擎初始化的微小闪烁
                            loader.style.transition = "opacity 0.5s ease-out";
                            loader.style.opacity = "0";
                            setTimeout(() => {
                                loader.remove(); // 彻底从内存中铲除！
                            }, 500);
                        }
                        observer.disconnect(); // 任务完成，停止监控
                        return;
                    }
                }
            }
        }
    });
    // 让监控器盯紧 <body> 标签
    observer.observe(document.body, { childList: true, subtree: true });
</script>

<!-- ===== PWA: Install Prompt ===== -->
<script>
    // Capture install prompt for manual triggering later
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Expose to Flutter via js channel if needed
        window.__pwaInstallReady = true;
        console.log('[PWA] Install prompt ready');
    });

    window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        window.__pwaInstalled = true;
        console.log('[PWA] App installed successfully');
    });

    // Allow Flutter to trigger install prompt via JS interop
    window.triggerPwaInstall = function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((result) => {
                console.log('[PWA] User choice:', result.outcome);
                deferredPrompt = null;
            });
            return true;
        }
        return false;
    };

    // Allow Flutter to apply a waiting SW update before reloading.
    // Some SWs require an explicit skipWaiting message; plain reload is not enough.
    window.applyPwaUpdate = function() {
        if (!('serviceWorker' in navigator)) {
            window.location.reload();
            return true;
        }

        navigator.serviceWorker.getRegistration('/').then((reg) => {
            if (reg && reg.waiting) {
                const waiting = reg.waiting;
                const done = () => {
                    window.__pwaUpdateReady = false;
                    window.location.reload();
                };

                navigator.serviceWorker.addEventListener('controllerchange', done, { once: true });

                // Compatible with common SW conventions.
                try { waiting.postMessage({ type: 'SKIP_WAITING' }); } catch (_) {}
                try { waiting.postMessage('skipWaiting'); } catch (_) {}

                // Fallback to avoid being stuck if controllerchange is not fired.
                setTimeout(done, 1500);
            } else {
                window.__pwaUpdateReady = false;
                window.location.reload();
            }
        }).catch(() => {
            window.__pwaUpdateReady = false;
            window.location.reload();
        });

        return true;
    };

    // Let Flutter trigger a manual SW update check in debug/support flows.
    window.forcePwaUpdateCheck = function() {
        if (!('serviceWorker' in navigator)) {
            window.__pwaUpdateReady = false;
            return false;
        }

        navigator.serviceWorker.getRegistration('/').then((reg) => {
            if (!reg) {
                window.__pwaUpdateReady = false;
                return;
            }

            reg.update()
                .then(() => {
                    window.__pwaUpdateReady = !!reg.waiting;
                })
                .catch(() => {
                    // Keep previous state on transient failures.
                });
        });

        return true;
    };
</script>

<!-- ===== PWA: Custom Service Worker Registration ===== -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/pwa_sw.js', { scope: '/' })
                .then((reg) => {
                    console.log('[PWA] SW registered, scope:', reg.scope);

                    const syncUpdateReady = () => {
                        const hasWaitingWorker = !!reg.waiting;
                        window.__pwaUpdateReady = hasWaitingWorker;
                        if (hasWaitingWorker) {
                            console.log('[PWA] New version available (waiting worker)');
                        }
                    };

                    // Keep flag in sync with real SW lifecycle.
                    syncUpdateReady();
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', () => {
                            // installed + existing controller means update is ready for activation.
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.__pwaUpdateReady = true;
                            }
                            syncUpdateReady();
                        });
                    });

                    // Force one update check so first paint can discover waiting updates quickly.
                    reg.update().catch(() => {});

                    navigator.serviceWorker.addEventListener('controllerchange', () => {
                        window.__pwaUpdateReady = false;
                    });
                })
                .catch((err) => console.warn('[PWA] SW registration failed:', err));
        });
    }
</script>
